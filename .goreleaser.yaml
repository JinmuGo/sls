# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    ldflags:
      - -s -w
      - -X github.com/jinmugo/sls/cmd.version={{.Version}}
      - -X github.com/jinmugo/sls/cmd.commit={{.Commit}}
      - -X github.com/jinmugo/sls/cmd.date={{.Date}}
      - -X github.com/jinmugo/sls/cmd.builtBy=goreleaser

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: jinmugo
    name: sls

brews:
  - name: sls
    repository:
      owner: jinmugo
      name: homebrew-tap
    url_template: "https://github.com/jinmugo/sls/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    commit_author:
      name: JinmuGo Bot
      email: hi@jinmugo.me
    directory: Formula
    homepage: "https://github.com/jinmugo/sls"
    description: A smart fuzzy CLI selector for SSH config hosts
    test: |
      system "#{bin}/sls version"
    install: |
      bin.install "sls"
    dependencies:
      - name: fzf

nfpms:
  - id: sls
    package_name: sls
    vendor: jinmugo
    homepage: https://github.com/jinmugo/sls
    maintainer: JinmuGo <hi@jinmugo.me>
    description: A smart fuzzy CLI selector for SSH config hosts
    license: MIT
    formats:
      - deb
      - rpm
    dependencies:
      - fzf
    bindir: /usr/bin
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/sls/LICENSE
        file_info:
          mode: 0644
